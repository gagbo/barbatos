---
# GitLab CI/CD Configuration for BarbatOS Image Build via BlueBuild

variables:
  BLUEBUILD_CLI_IMAGE: "ghcr.io/blue-build/cli:v0.9-installer"
  COSIGN_IMAGE: "ghcr.io/sigstore/cosign/cosign:v3.0.5"
  STORAGE_DRIVER: "vfs"
  BUILDAH_FORMAT: "docker"
  BUILDAH_ISOLATION: "chroot"

stages:
  - build

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"

bluebuild:
  stage: build
  image: quay.io/containers/aio:latest
  interruptible: true
  resource_group: $CI_COMMIT_REF_NAME
  variables:
    BB_REGISTRY: "$CI_REGISTRY"
    BB_REGISTRY_NAMESPACE: "$CI_PROJECT_NAMESPACE"
    BB_USERNAME: "$CI_REGISTRY_USER"
    BB_PASSWORD: "$CI_REGISTRY_PASSWORD"
    BB_RETRY_PUSH_COUNT: "3"
  before_script:
    - podman run --pull=always --rm "$BLUEBUILD_CLI_IMAGE" | bash
    - |
      cosign_container="$(podman create --pull=always "$COSIGN_IMAGE")"
      podman cp "$cosign_container:/ko-app/cosign" /usr/local/bin/cosign
      podman rm "$cosign_container"
      chmod +x /usr/local/bin/cosign
    - bluebuild --version
    - cosign version
    - |
      if [ -n "${COSIGN_PRIVATE_KEY:-}" ]; then
        decoded_key="$(printf '%s' "$COSIGN_PRIVATE_KEY" | base64 -d 2>/dev/null || printf '%s' "$COSIGN_PRIVATE_KEY")"
        export COSIGN_PRIVATE_KEY="$decoded_key"
      fi
  script:
    - |
      set -euo pipefail

      export BB_BUILD_PUSH=false
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ] && [ "$CI_PIPELINE_SOURCE" != "merge_request_event" ]; then
        export BB_BUILD_PUSH=true
      fi

      extra_args=()
      if [ "${BB_RETRY_PUSH_COUNT}" != "0" ]; then
        extra_args+=(--retry-push --retry-count "${BB_RETRY_PUSH_COUNT}")
      fi

      bluebuild build -v "${extra_args[@]}" recipes/recipe.yml
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
